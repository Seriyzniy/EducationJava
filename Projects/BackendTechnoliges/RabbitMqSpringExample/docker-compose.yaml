version: "3.5"

services:
  rabbit1-service:
    image: rabbitmq:3-management
    container_name: rabbitmq-container-1
    hostname: rabbit1
    ports:
      - "5671:5672"
      - "15671:15672"
    environment:
      RABBITMQ_NODENAME: rabbit@rabbit1
      RABBITMQ_ERLANG_COOKIE: "secret_cookie"

  rabbit2-service:
    image: rabbitmq:3-management
    container_name: rabbitmq-container-2
    hostname: rabbit2
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_NODENAME: rabbit@rabbit2
      RABBITMQ_ERLANG_COOKIE: "secret_cookie"

